# Captures the App Store screenshots (notes/store-listing.md §7) on an
# iPhone 16 Pro Max simulator (6.9", 1320x2868) by signing in to the real
# review-demo backend — no local Mac needed. Run manually from the Actions
# tab; download the "store-screenshots" artifact and upload the PNGs to
# App Store Connect.
#
# The defaults below are the review-demo values already documented in
# notes/review-demo.md (none of them are secrets: the API is protected by
# Cognito sign-in and the demo account contains only sample photos). Set a
# REVIEW_DEMO_PASSWORD repository secret to override the password without
# typing it into the run form.
name: Store Screenshots

on:
  workflow_dispatch:
    inputs:
      config_json:
        description: "デモ環境の AppConfigJson(スタック出力の値)"
        required: true
        default: '{"apiEndpoint":"https://0t0zusp3vb.execute-api.ap-northeast-1.amazonaws.com","region":"ap-northeast-1","clientId":"5ba7ku5qehtougs71b8agi9ov9"}'
      demo_email:
        description: "審査用デモアカウントのメールアドレス"
        required: true
        default: "review-demo@example.com"
      demo_password:
        description: "審査用デモアカウントのパスワード(REVIEW_DEMO_PASSWORD シークレットがあればそちらを優先)"
        required: true
        default: "ReviewDemo2026!"

jobs:
  screenshots:
    runs-on: macos-15
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen and xcparse
        run: brew install xcodegen chargepoint/xcparse/xcparse

      - name: Generate Xcode project
        run: xcodegen generate
        working-directory: ios

      # Store screenshots must be 6.9-inch (1320x2868), so a Pro Max device
      # is required — unlike ci.yml, which takes whatever iPhone the image
      # ships. Create it from the runtime's own supportedDeviceTypes.
      - name: Create iPhone 16 Pro Max simulator
        id: sim
        run: |
          set -euo pipefail
          eval "$(xcrun simctl list -j runtimes | python3 -c '
          import json, sys
          runtimes = [r for r in json.load(sys.stdin)["runtimes"]
                      if r["platform"] == "iOS" and r["isAvailable"]]
          runtimes.sort(key=lambda r: [int(x) for x in r["version"].split(".")])
          runtime = runtimes[-1]
          types = runtime["supportedDeviceTypes"]
          exact = [t for t in types if t["name"] == "iPhone 16 Pro Max"]
          promax = [t for t in types if "Pro Max" in t["name"]]
          chosen = (exact or promax)[-1] if (exact or promax) else None
          if chosen is None:
              sys.exit("No Pro Max device type in runtime " + runtime["identifier"])
          print("RUNTIME=" + runtime["identifier"])
          print("DEVICE_TYPE=" + chosen["identifier"])
          print("DEVICE_NAME=" + chosen["name"].replace(" ", "-"))')"
          udid=$(xcrun simctl create store-shot "$DEVICE_TYPE" "$RUNTIME")
          echo "Created $DEVICE_TYPE on $RUNTIME ($udid)"
          xcrun simctl boot "$udid"
          xcrun simctl bootstatus "$udid"
          echo "udid=$udid" >> "$GITHUB_OUTPUT"

      # The classic marketing status bar: 9:41, full battery and signal.
      - name: Override status bar
        run: >
          xcrun simctl status_bar ${{ steps.sim.outputs.udid }} override
          --time "9:41"
          --dataNetwork wifi --wifiMode active --wifiBars 3
          --cellularMode active --cellularBars 4
          --batteryState charged --batteryLevel 100

      - name: Build for testing
        run: >
          xcodebuild build-for-testing
          -project PhotoUploader.xcodeproj
          -scheme PhotoUploader
          -destination 'platform=iOS Simulator,id=${{ steps.sim.outputs.udid }}'
          -derivedDataPath DerivedData
          CODE_SIGNING_ALLOWED=NO
        working-directory: ios

      # Pre-grant photo access so the in-app library picker never hits the
      # permission dialog (notifications can't be pre-granted this way; the
      # UI test dismisses that alert itself).
      - name: Install app and grant photo access
        run: |
          set -euo pipefail
          xcrun simctl install ${{ steps.sim.outputs.udid }} \
            ios/DerivedData/Build/Products/Debug-iphonesimulator/PhotoUploader.app
          xcrun simctl privacy ${{ steps.sim.outputs.udid }} grant photos \
            io.github.ysu119190-lab.photouploader

      - name: Capture screenshots
        env:
          TEST_RUNNER_UITEST_STORE_SCREENSHOTS: "1"
          TEST_RUNNER_UITEST_CONFIG_JSON: ${{ inputs.config_json }}
          TEST_RUNNER_UITEST_DEMO_EMAIL: ${{ inputs.demo_email }}
          TEST_RUNNER_UITEST_DEMO_PASSWORD: ${{ secrets.REVIEW_DEMO_PASSWORD || inputs.demo_password }}
        run: >
          xcodebuild test-without-building
          -project PhotoUploader.xcodeproj
          -scheme PhotoUploader
          -destination 'platform=iOS Simulator,id=${{ steps.sim.outputs.udid }}'
          -derivedDataPath DerivedData
          -only-testing:PhotoUploaderUITests/StoreScreenshotUITests
          -resultBundlePath StoreScreenshots.xcresult
          CODE_SIGNING_ALLOWED=NO
        working-directory: ios

      - name: Extract screenshots from test results
        if: always()
        run: |
          xcparse screenshots ios/StoreScreenshots.xcresult store-screenshots
          echo "Captured files and sizes (App Store 6.9\" requires 1320x2868):"
          find store-screenshots -name '*.png' -print -exec sips -g pixelWidth -g pixelHeight {} \;

      - name: Upload screenshots artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: store-screenshots
          path: store-screenshots
          if-no-files-found: warn
