name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:

jobs:
  backend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install cfn-lint
        run: pip install cfn-lint
      - name: Lint SAM template
        run: cfn-lint backend/template.yaml
      - name: Compile Lambda source
        run: python -m py_compile backend/src/presign/app.py

  ios-build:
    # macos-15 ships Xcode 16, required to open the project format that
    # current XcodeGen releases generate.
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate Xcode project
        run: xcodegen generate
        working-directory: ios
      - name: Build (iOS Simulator, no signing)
        run: >
          xcodebuild build
          -project PhotoUploader.xcodeproj
          -scheme PhotoUploader
          -destination 'generic/platform=iOS Simulator'
          CODE_SIGNING_ALLOWED=NO
        working-directory: ios
