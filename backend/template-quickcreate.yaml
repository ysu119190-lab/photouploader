AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  PhotoUploader backend, packaged as a single self-contained template for
  CloudFormation quick-create links: end users deploy it with one click in
  the AWS console — no git, SAM CLI, or command line needed.
  NOTE: the Lambda source is inlined below and must be kept in sync with
  backend/src/presign/app.py (CI enforces this).

Globals:
  Function:
    Runtime: python3.12
    Timeout: 10
    MemorySize: 128

Resources:
  PhotoBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UsernameAttributes:
        - email
      AutoVerifiedAttributes:
        - email
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: false
          RequireLowercase: false
          RequireNumbers: false
          RequireSymbols: false

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      UserPoolId: !Ref UserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH

  Api:
    Type: AWS::Serverless::HttpApi
    Properties:
      Auth:
        DefaultAuthorizer: CognitoJwtAuthorizer
        Authorizers:
          CognitoJwtAuthorizer:
            JwtConfiguration:
              issuer: !Sub "https://cognito-idp.${AWS::Region}.amazonaws.com/${UserPool}"
              audience:
                - !Ref UserPoolClient
            IdentitySource: "$request.header.Authorization"

  PresignFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: index.handler
      Description: Issues presigned S3 PUT URLs for photo uploads.
      Environment:
        Variables:
          BUCKET_NAME: !Ref PhotoBucket
      Policies:
        - S3WritePolicy:
            BucketName: !Ref PhotoBucket
      Events:
        Presign:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /presign
            Method: POST
      InlineCode: |
        """Lambda handler that issues presigned S3 PUT URLs for photo uploads.

        The API Gateway JWT authorizer (Cognito) has already validated the caller's
        ID token before this handler runs; the verified claims arrive in the request
        context. The iOS app POSTs {"contentType": "image/jpeg"} and receives
        {"uploadUrl": ..., "key": ..., "expiresIn": ...}. It then PUTs the photo
        bytes directly to S3 using that URL, so the app never needs AWS credentials
        and the photo bytes never pass through Lambda. Each user's photos are stored
        under their own uploads/<user id>/ prefix.
        """

        import datetime
        import json
        import os
        import uuid

        import boto3
        from botocore.config import Config

        s3 = boto3.client("s3", config=Config(signature_version="s3v4"))

        BUCKET_NAME = os.environ["BUCKET_NAME"]
        # Background uploads may sit in the OS queue for a while before they run,
        # so give the URL a generous lifetime. The app retries with a fresh URL on
        # 403 in case it still expires (URLs signed with Lambda's temporary
        # credentials die with those credentials regardless of this value).
        EXPIRES_IN_SECONDS = 3600

        # Content types the app may upload, mapped to the object key extension.
        ALLOWED_CONTENT_TYPES = {
            "image/jpeg": ".jpg",
            "image/png": ".png",
            "image/heic": ".heic",
            "image/heif": ".heif",
            "image/webp": ".webp",
            "image/gif": ".gif",
        }


        def handler(event, _context):
            claims = (
                event.get("requestContext", {})
                .get("authorizer", {})
                .get("jwt", {})
                .get("claims", {})
            )
            user_id = claims.get("sub")
            if not user_id:
                return _response(401, {"message": "Unauthorized"})

            try:
                body = json.loads(event.get("body") or "{}")
            except json.JSONDecodeError:
                return _response(400, {"message": "Request body must be valid JSON"})

            content_type = body.get("contentType", "")
            extension = ALLOWED_CONTENT_TYPES.get(content_type)
            if extension is None:
                return _response(
                    400,
                    {
                        "message": "Unsupported contentType",
                        "allowed": sorted(ALLOWED_CONTENT_TYPES),
                    },
                )

            now = datetime.datetime.now(datetime.timezone.utc)
            key = f"uploads/{user_id}/{now:%Y/%m/%d}/{uuid.uuid4()}{extension}"

            upload_url = s3.generate_presigned_url(
                "put_object",
                Params={"Bucket": BUCKET_NAME, "Key": key, "ContentType": content_type},
                ExpiresIn=EXPIRES_IN_SECONDS,
            )

            return _response(
                200,
                {"uploadUrl": upload_url, "key": key, "expiresIn": EXPIRES_IN_SECONDS},
            )


        def _response(status_code, body):
            return {
                "statusCode": status_code,
                "headers": {"Content-Type": "application/json"},
                "body": json.dumps(body),
            }

Outputs:
  AppConfigJson:
    Description: >
      Paste this whole value into the app's setup screen (or turn it into a
      QR code and scan it with the app).
    Value: !Sub '{"apiEndpoint":"https://${Api}.execute-api.${AWS::Region}.amazonaws.com","region":"${AWS::Region}","clientId":"${UserPoolClient}"}'
  ApiEndpoint:
    Description: Base URL for the API. The iOS app POSTs to <ApiEndpoint>/presign.
    Value: !Sub "https://${Api}.execute-api.${AWS::Region}.amazonaws.com"
  UserPoolId:
    Description: Cognito user pool ID.
    Value: !Ref UserPool
  UserPoolClientId:
    Description: Cognito app client ID the iOS app authenticates against.
    Value: !Ref UserPoolClient
  Region:
    Description: Region the stack is deployed in (needed by the iOS app config).
    Value: !Ref AWS::Region
  BucketName:
    Description: Bucket that receives the uploaded photos.
    Value: !Ref PhotoBucket
