AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Photo upload backend: a Cognito user pool for sign-up/sign-in, an S3 bucket,
  and a Lambda (behind a JWT-protected API Gateway HTTP API) that issues
  presigned PUT URLs so the iOS app never holds AWS credentials.

Parameters:
  # (任意) Cognito の確認メールを Amazon SES 経由で送るための、検証済み
  # SES ID(メールアドレスまたはドメイン)の ARN。空のままなら Cognito の
  # 標準送信(1アカウント1日50通・検証用)を使う。多人数で同じスタックを
  # 共有する場合のみ設定すればよい。
  # 例: arn:aws:ses:ap-northeast-1:123456789012:identity/you@example.com
  CognitoSesSourceArn:
    Type: String
    Default: ""
    Description: >-
      (Optional) ARN of a verified SES identity for Cognito verification
      emails. Leave empty to use Cognito's default sender (50 emails/day).

Conditions:
  UseSesForCognitoEmail: !Not [!Equals [!Ref CognitoSesSourceArn, ""]]

Globals:
  Function:
    Runtime: python3.12
    Timeout: 10
    MemorySize: 128

Resources:
  PhotoBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          # Deleted photos are moved to trash/ by the API; expire them fully
          # after 30 days so storage costs stop.
          - Id: ExpireTrash
            Status: Enabled
            Prefix: trash/
            ExpirationInDays: 30

  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      EmailConfiguration: !If
        - UseSesForCognitoEmail
        - EmailSendingAccount: DEVELOPER
          SourceArn: !Ref CognitoSesSourceArn
        - !Ref AWS::NoValue
      UsernameAttributes:
        - email
      AutoVerifiedAttributes:
        - email
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: false
          RequireLowercase: false
          RequireNumbers: false
          RequireSymbols: false

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      UserPoolId: !Ref UserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH

  Api:
    Type: AWS::Serverless::HttpApi
    Properties:
      Auth:
        DefaultAuthorizer: CognitoJwtAuthorizer
        Authorizers:
          CognitoJwtAuthorizer:
            JwtConfiguration:
              issuer: !Sub "https://cognito-idp.${AWS::Region}.amazonaws.com/${UserPool}"
              audience:
                - !Ref UserPoolClient
            IdentitySource: "$request.header.Authorization"

  PresignFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/presign/
      Handler: app.handler
      Description: Issues presigned S3 PUT URLs for photo uploads.
      Environment:
        Variables:
          BUCKET_NAME: !Ref PhotoBucket
      Policies:
        - S3WritePolicy:
            BucketName: !Ref PhotoBucket
        - S3ReadPolicy:
            BucketName: !Ref PhotoBucket
        # SAM's S3WritePolicy has no s3:DeleteObject — the delete route
        # (move to trash) needs it explicitly.
        - Statement:
            - Effect: Allow
              Action:
                - s3:DeleteObject
              Resource: !Sub "${PhotoBucket.Arn}/*"
      Events:
        Presign:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /presign
            Method: POST
        Photos:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /photos
            Method: GET
        DeletePhotos:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /photos/delete
            Method: POST

Outputs:
  AppConfigJson:
    Description: >
      Paste this whole value into the app's setup screen (or turn it into a
      QR code and scan it with the app).
    Value: !Sub '{"apiEndpoint":"https://${Api}.execute-api.${AWS::Region}.amazonaws.com","region":"${AWS::Region}","clientId":"${UserPoolClient}"}'
  ApiEndpoint:
    Description: Base URL for the API. The iOS app POSTs to <ApiEndpoint>/presign.
    Value: !Sub "https://${Api}.execute-api.${AWS::Region}.amazonaws.com"
  UserPoolId:
    Description: Cognito user pool ID.
    Value: !Ref UserPool
  UserPoolClientId:
    Description: Cognito app client ID the iOS app authenticates against.
    Value: !Ref UserPoolClient
  Region:
    Description: Region the stack is deployed in (needed by the iOS app config).
    Value: !Ref AWS::Region
  BucketName:
    Description: Bucket that receives the uploaded photos.
    Value: !Ref PhotoBucket
