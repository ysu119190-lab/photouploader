AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Photo upload backend: a Cognito user pool for sign-up/sign-in, an S3 bucket,
  and a Lambda (behind a JWT-protected API Gateway HTTP API) that issues
  presigned PUT URLs so the iOS app never holds AWS credentials.

Globals:
  Function:
    Runtime: python3.12
    Timeout: 10
    MemorySize: 128

Resources:
  PhotoBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UsernameAttributes:
        - email
      AutoVerifiedAttributes:
        - email
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: false
          RequireLowercase: false
          RequireNumbers: false
          RequireSymbols: false

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      UserPoolId: !Ref UserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH

  Api:
    Type: AWS::Serverless::HttpApi
    Properties:
      Auth:
        DefaultAuthorizer: CognitoJwtAuthorizer
        Authorizers:
          CognitoJwtAuthorizer:
            JwtConfiguration:
              issuer: !Sub "https://cognito-idp.${AWS::Region}.amazonaws.com/${UserPool}"
              audience:
                - !Ref UserPoolClient
            IdentitySource: "$request.header.Authorization"

  PresignFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/presign/
      Handler: app.handler
      Description: Issues presigned S3 PUT URLs for photo uploads.
      Environment:
        Variables:
          BUCKET_NAME: !Ref PhotoBucket
      Policies:
        - S3WritePolicy:
            BucketName: !Ref PhotoBucket
      Events:
        Presign:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /presign
            Method: POST

Outputs:
  ApiEndpoint:
    Description: Base URL for the API. The iOS app POSTs to <ApiEndpoint>/presign.
    Value: !Sub "https://${Api}.execute-api.${AWS::Region}.amazonaws.com"
  UserPoolId:
    Description: Cognito user pool ID.
    Value: !Ref UserPool
  UserPoolClientId:
    Description: Cognito app client ID the iOS app authenticates against.
    Value: !Ref UserPoolClient
  Region:
    Description: Region the stack is deployed in (needed by the iOS app config).
    Value: !Ref AWS::Region
  BucketName:
    Description: Bucket that receives the uploaded photos.
    Value: !Ref PhotoBucket
