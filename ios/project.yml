name: PhotoUploader
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    CODE_SIGN_STYLE: Automatic

targets:
  PhotoUploader:
    type: application
    platform: iOS
    sources:
      - PhotoUploader
    info:
      path: PhotoUploader/Info.plist
      properties:
        CFBundleDisplayName: PhotoUploader
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        ITSAppUsesNonExemptEncryption: false
        NSCameraUsageDescription: 設定用QRコードの読み取りにカメラを使用します

  PhotoUploaderUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - PhotoUploaderUITests
    dependencies:
      - target: PhotoUploader
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: PhotoUploader

schemes:
  PhotoUploader:
    build:
      targets:
        PhotoUploader: all
        PhotoUploaderUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - PhotoUploaderUITests
