name: PhotoUploader
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    CODE_SIGN_STYLE: Automatic

packages:
  GoogleMobileAds:
    url: https://github.com/googleads/swift-package-manager-google-mobile-ads
    from: "11.2.0"

targets:
  PhotoUploader:
    type: application
    platform: iOS
    sources:
      - PhotoUploader
    dependencies:
      - package: GoogleMobileAds
        product: GoogleMobileAds
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: PhotoUploader/Info.plist
      properties:
        CFBundleDisplayName: PhotoUploader
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        ITSAppUsesNonExemptEncryption: false
        NSCameraUsageDescription: 設定用QRコードの読み取りと、撮影した写真をそのままバックアップするためにカメラを使用します
        NSPhotoLibraryAddUsageDescription: バックアップ済みの写真や動画を写真アプリに保存(復元)するために使用します
        NSPhotoLibraryUsageDescription: まだバックアップしていない写真・動画を探してまとめてアップロードするために写真ライブラリを使用します
        # AdMob: Google's official TEST application ID. Replace with your own
        # AdMob app ID before releasing to the App Store (see README).
        GADApplicationIdentifier: ca-app-pub-3940256099942544~1458002511
        SKAdNetworkItems:
          - SKAdNetworkIdentifier: cstr6suwn9.skadnetwork

  PhotoUploaderUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - PhotoUploaderUITests
    dependencies:
      - target: PhotoUploader
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: PhotoUploader

schemes:
  PhotoUploader:
    build:
      targets:
        PhotoUploader: all
        PhotoUploaderUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - PhotoUploaderUITests
