name: PhotoUploader
options:
  # Test bundles derive their IDs from this prefix; the app target pins its
  # exact (all-lowercase) ID below to match the App Store registration.
  bundleIdPrefix: io.github.ysu119190-lab
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    CODE_SIGN_STYLE: Automatic

packages:
  GoogleMobileAds:
    url: https://github.com/googleads/swift-package-manager-google-mobile-ads
    from: "11.2.0"

targets:
  PhotoUploader:
    type: application
    platform: iOS
    sources:
      - PhotoUploader
    dependencies:
      - package: GoogleMobileAds
        product: GoogleMobileAds
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Registered App ID (App Store Connect). Keep exactly in sync.
        PRODUCT_BUNDLE_IDENTIFIER: io.github.ysu119190-lab.photouploader
        # Must live at the target level: XcodeGen's iOS platform preset sets
        # TARGETED_DEVICE_FAMILY to "1,2" on each target, which shadows the
        # project-level "1" and made App Store validation demand iPad
        # multitasking orientations.
        TARGETED_DEVICE_FAMILY: "1"
    info:
      path: PhotoUploader/Info.plist
      properties:
        CFBundleDisplayName: PhotoUploader
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        ITSAppUsesNonExemptEncryption: false
        NSCameraUsageDescription: 設定用QRコードの読み取りと、撮影した写真をそのままバックアップするためにカメラを使用します
        NSPhotoLibraryAddUsageDescription: バックアップ済みの写真や動画を写真アプリに保存(復元)するために使用します
        NSPhotoLibraryUsageDescription: まだバックアップしていない写真・動画を探してまとめてアップロードするために写真ライブラリを使用します
        # AdMob production app ID. Ad *unit* IDs live in AdsConfig.swift
        # (Debug builds use Google's test units under this same app ID).
        GADApplicationIdentifier: ca-app-pub-5308803840858138~8910062706
        # Google's recommended SKAdNetwork list for AdMob (attribution for
        # non-personalized campaigns). Re-check against the official list
        # before each submission:
        # https://developers.google.com/admob/ios/3p-skadnetworks
        SKAdNetworkItems:
          - SKAdNetworkIdentifier: cstr6suwn9.skadnetwork
          - SKAdNetworkIdentifier: 4fzdc2evr5.skadnetwork
          - SKAdNetworkIdentifier: 2fnua5tdw4.skadnetwork
          - SKAdNetworkIdentifier: ydx93a7ass.skadnetwork
          - SKAdNetworkIdentifier: p78axxw29g.skadnetwork
          - SKAdNetworkIdentifier: v72qych5uu.skadnetwork
          - SKAdNetworkIdentifier: ludvb6z3bs.skadnetwork
          - SKAdNetworkIdentifier: cp8zw746q7.skadnetwork
          - SKAdNetworkIdentifier: 3sh42y64q3.skadnetwork
          - SKAdNetworkIdentifier: c6k4g5qg8m.skadnetwork
          - SKAdNetworkIdentifier: s39g8k73mm.skadnetwork
